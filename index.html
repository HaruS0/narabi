<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>順番待ち状況</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .card { border: 1px solid #ddd; padding: 25px; max-width: 400px; margin: 0 auto; border-radius: 15px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 12px; width: 80px; font-size: 1.2rem; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 20px; font-size: 1rem; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 20px; font-size: 1.1rem; }
        .info-box { margin-top: 20px; text-align: left; border-top: 1px solid #eee; pt: 10px; }
        .calling-list { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>順番確認</h1>
        <input type="number" id="myNumber" placeholder="番号">
        <button onclick="saveAndCheck()">確認する</button>

        <div id="status"></div>
        
        <div class="info-box">
            <p>現在の待機組数: <span id="total">--</span> 組</p>
            <p>呼び出し中: <span id="callingList" class="calling-list">--</span></p>
        </div>
    </div>

    <script>
        // 【重要】ここにGASの新しいデプロイURLを貼り付けてください
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzT3ghoyUyfSutNBu-sx0PFdgDQxQiT0tsBH_rXVEPNJkSmhC0_lky60RR6-53b1Uyd/exec';

        function saveAndCheck() {
            const num = document.getElementById('myNumber').value;
            localStorage.setItem('myNumber', num);
            checkStatus();
        }

        async function checkStatus() {
            const myNumber = localStorage.getItem('myNumber');
            if (!myNumber) return;

            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                const myNumInt = parseInt(myNumber);
                
                // 待機人数とリストの更新
                document.getElementById('total').innerText = data.totalWaiting;
                document.getElementById('callingList').innerText = 
                    data.callingNumbers.length > 0 ? data.callingNumbers.join(', ') : "なし";

                // 自分より前の待機組数を計算
                const peopleBeforeMe = data.waitingNumbers.filter(n => n < myNumInt).length;
                
                const statusDiv = document.getElementById('status');
                
                if (data.callingNumbers.includes(myNumInt)) {
                    statusDiv.innerHTML = `<h2 style="color:red;">${myNumber}番様、お呼び出し中です！</h2>`;
                } else if (data.waitingNumbers.includes(myNumInt)) {
                    statusDiv.innerHTML = `<h3>${myNumber}番様は待機中です。<br>あと <b>${peopleBeforeMe}組</b> で順番です。</h3>`;
                } else {
                    statusDiv.innerHTML = `<h3>${myNumber}番様は現在リストにありません。</h3>`;
                }
            } catch (e) {
                console.error("更新エラー:", e);
            }
        }

        setInterval(checkStatus, 10000);
        if (localStorage.getItem('myNumber')) {
            document.getElementById('myNumber').value = localStorage.getItem('myNumber');
            checkStatus();
        }
    </script>
</body>
</html>
