<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3年2組 ママにゲーム隠された？</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: rgb(0, 191, 255); font-size: 1.2rem; }
        .title-container { margin-bottom: 30px; }
        .main-title { color: red; font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 4px white; }
        .sub-title { color: red; font-size: 2rem; margin: 0; text-shadow: 2px 2px 2px white; }
        
        .card { border: 1px solid #ddd; padding: 30px; max-width: 500px; margin: 0 auto; border-radius: 20px; background: white; box-shadow: 0 6px 10px rgba(0,0,0,0.2); }
        input { padding: 20px; width: 120px; font-size: 1.5rem; margin-bottom: 20px; border: 2px solid #ccc; border-radius: 10px; }
        button { padding: 20px 40px; font-size: 1.5rem; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 10px; width: 100%; }
        
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #status { margin-top: 20px; font-size: 1.3rem; }
        .info-box { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .calling-list { color: #d9534f; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="title-container">
        <h1 class="main-title">3年2組</h1>
        <h2 class="sub-title">ママにゲーム隠された！</h2>
    </div>

    <div class="card">
        <h1>順番確認</h1>
        <input type="number" id="myNumber" placeholder="番号" inputmode="numeric" pattern="\d*">
        <button onclick="saveAndCheck()">確認する</button>

        <div id="loading" class="spinner"></div>
        <div id="status">番号を入力して確認してください</div>
        
        <div class="info-box">
            <p>現在の待機組数: <span id="total">--</span> 組</p>
            <p>呼び出し中: <span id="callingList" class="calling-list">--</span></p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzT3ghoyUyfSutNBu-sx0PFdgDQxQiT0tsBH_rXVEPNJkSmhC0_lky60RR6-53b1Uyd/exec';

        function saveAndCheck() {
            const num = document.getElementById('myNumber').value;
            if(num) {
                localStorage.setItem('myNumber', num);
                checkStatus();
            }
        }

        async function checkStatus() {
            const myNumber = localStorage.getItem('myNumber');
            if (!myNumber) return;

            document.getElementById('loading').style.display = "block";
            
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                const myNumInt = parseInt(myNumber);
                document.getElementById('total').innerText = data.totalWaiting;
                document.getElementById('callingList').innerText = 
                    data.callingNumbers.length > 0 ? data.callingNumbers.join(', ') : "なし";

                const peopleBeforeMe = data.waitingNumbers.filter(n => n < myNumInt).length;
                const statusDiv = document.getElementById('status');
                
                if (data.callingNumbers.includes(myNumInt)) {
                    statusDiv.innerHTML = `<h2 style="color:red; font-size:2rem;">${myNumber}番様、お呼び出し中です！</h2>`;
                } else if (data.waitingNumbers.includes(myNumInt)) {
                    // ここで待ち時間を計算（1組1分）
                    const waitTime = peopleBeforeMe * 1; 
                    statusDiv.innerHTML = `<h3>${myNumber}番様は待機中です。<br>あと <b>${peopleBeforeMe}組</b> (目安：約${waitTime}分) で順番です。</h3>`;
                } else {
                    statusDiv.innerHTML = `<h3>${myNumber}番様は現在リストにありません。</h3>`;
                }
            } catch (e) {
                console.error("更新エラー:", e);
                document.getElementById('status').innerText = "接続エラー発生。再試行中...";
            } finally {
                document.getElementById('loading').style.display = "none";
            }
        }

        setInterval(checkStatus, 10000);
        
        if (localStorage.getItem('myNumber')) {
            document.getElementById('myNumber').value = localStorage.getItem('myNumber');
            checkStatus();
        }
    </script>
</body>
</html>
