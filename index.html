<!DOCTYPE html>
<html>
<head>
    <title>順番待ち状況</title>
</head>
<body>
    <h1>現在の待ち状況</h1>
    <div id="queue-status">読み込み中...</div>

    <script>
        // 上記で公開したGASのURL
        const SCRIPT_URL = 'あなたのデプロイしたGASのURL';

        async function fetchQueue() {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            document.getElementById('queue-status').innerText = 
                '現在 ' + data.length + ' 組お待ちです。';
        }
        
        // 5秒ごとに自動更新
        setInterval(fetchQueue, 5000);
        fetchQueue();
    </script>
</body>
</html>
