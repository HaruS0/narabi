<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>順番待ち確認</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; max-width: 300px; margin: 0 auto; border-radius: 10px; }
        input { padding: 10px; width: 60px; font-size: 1.2rem; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>順番確認</h1>
        <input type="number" id="myNumber" placeholder="番号">
        <button onclick="saveAndCheck()">確認する</button>
        <div id="status" style="margin-top:20px;"></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzT3ghoyUyfSutNBu-sx0PFdgDQxQiT0tsBH_rXVEPNJkSmhC0_lky60RR6-53b1Uyd/exec';

        // 番号を保存してチェック開始
        function saveAndCheck() {
            const num = document.getElementById('myNumber').value;
            localStorage.setItem('myNumber', num);
            checkStatus();
        }

        async function checkStatus() {
            const myNumber = localStorage.getItem('myNumber');
            if (!myNumber) return;

            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            const isCalled = data.callingNumbers.includes(parseInt(myNumber));
            const statusDiv = document.getElementById('status');
            
            if (isCalled) {
                statusDiv.innerHTML = `<h2 style="color:red;">${myNumber}番様、お呼び出し中です！</h2>`;
            } else {
                statusDiv.innerHTML = `<h3>${myNumber}番様は現在待機中です。<br>（残り${data.totalWaiting}組）</h3>`;
            }
        }

        // 5秒ごとに自動更新
        setInterval(checkStatus, 5000);
        
        // ページ読み込み時に番号があれば自動チェック
        if (localStorage.getItem('myNumber')) checkStatus();
    </script>
</body>
</html>
