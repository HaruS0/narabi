<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3年2組 ママにゲーム隠された！</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            padding: 20px; 
            background: linear-gradient(135deg, rgb(135, 206, 250), rgb(100, 180, 240));
            background-attachment: fixed;
            font-size: 1.2rem;
            min-height: 100vh;
        }
        .title-container { margin-bottom: 30px; }
        .main-title { color: #ff0000; font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 0px #fff; }
        .sub-title { color: #ff0000; font-size: 2rem; margin: 0; text-shadow: 1px 1px 0px #fff; }
        
        .card { 
            border: 6px solid #333; 
            padding: 30px; 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.2); 
        }
        
        input { padding: 20px; width: 120px; font-size: 1.5rem; margin-bottom: 20px; border: 4px solid #333; border-radius: 0; }
        button { padding: 20px 40px; font-size: 1.5rem; cursor: pointer; background: #28a745; color: white; border: 4px solid #333; border-radius: 0; width: 100%; font-weight: bold; }
        button:active { transform: translate(4px, 4px); box-shadow: none; }
        
        .spinner { border: 4px solid #ddd; border-top: 4px solid #ff4500; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #status { margin-top: 20px; font-size: 1.3rem; font-weight: bold; }
        .info-box { margin-top: 30px; text-align: left; border-top: 4px solid #333; padding-top: 20px; }
        
        /* 統一したフォントスタイル */
        .data-text { color: #d9534f; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="title-container">
        <h1 class="main-title">3年2組</h1>
        <h2 class="sub-title">ママにゲーム隠された！</h2>
    </div>

    <div class="card">
        <h1>順番確認</h1>
        <input type="number" id="myNumber" placeholder="番号" inputmode="numeric" pattern="\d*">
        <button onclick="saveAndCheck()">確認する</button>

        <div id="loading" class="spinner"></div>
        <div id="status">番号を入力して確認してください</div>
        
        <div class="info-box">
            <p>現在の待機組数: <span id="total" class="data-text">--</span> 組</p>
            <p>呼び出し中: <span id="callingList" class="data-text">--</span></p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzT3ghoyUyfSutNBu-sx0PFdgDQxQiT0tsBH_rXVEPNJkSmhC0_lky60RR6-53b1Uyd/exec';

        function saveAndCheck() {
            const num = document.getElementById('myNumber').value;
            if(num) {
                localStorage.setItem('myNumber', num);
                checkStatus();
            }
        }

        async function checkStatus() {
            const myNumber = localStorage.getItem('myNumber');
            if (!myNumber) return;

            document.getElementById('loading').style.display = "block";
            
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                const myNumInt = parseInt(myNumber);
                const statusDiv = document.getElementById('status');

                if (myNumInt <= 0 || isNaN(myNumInt)) {
                    statusDiv.innerHTML = `<h3>正しい番号を入力してください。</h3>`;
                } else {
                    document.getElementById('total').innerText = data.totalWaiting;
                    document.getElementById('callingList').innerText = 
                        data.callingNumbers.length > 0 ? data.callingNumbers.join(', ') : "なし";

                    const peopleBeforeMe = data.waitingNumbers.filter(n => n < myNumInt).length;
                    
                    if (data.callingNumbers.includes(myNumInt)) {
                        statusDiv.innerHTML = `<h2 style="color:red; font-size:2rem;">${myNumber}番様、お呼び出し中です！</h2>`;
                    } else if (data.waitingNumbers.includes(myNumInt)) {
                        statusDiv.innerHTML = `<h3>${myNumber}番様は待機中です。<br>あと <b>${peopleBeforeMe}組</b> で順番です。</h3>`;
                    } else {
                        statusDiv.innerHTML = `<h3>${myNumber}番様は現在リストにありません。</h3>`;
                    }
                }
            } catch (e) {
                console.error("更新エラー:", e);
                document.getElementById('status').innerText = "接続エラー発生。再試行中...";
            } finally {
                document.getElementById('loading').style.display = "none";
            }
        }

        setInterval(checkStatus, 10000);
        
        if (localStorage.getItem('myNumber')) {
            document.getElementById('myNumber').value = localStorage.getItem('myNumber');
            checkStatus();
        }
    </script>
</body>
</html>
