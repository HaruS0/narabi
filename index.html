<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>順番待ち確認</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9; }
        .card { border: 1px solid #ccc; padding: 20px; max-width: 400px; margin: 0 auto; border-radius: 10px; background: white; }
        input { padding: 10px; width: 80px; font-size: 1.2rem; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #status, #info { margin-top: 20px; }
        .calling-list { font-weight: bold; color: #d9534f; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>順番確認</h1>
        <input type="number" id="myNumber" placeholder="番号">
        <button onclick="saveAndCheck()">確認する</button>

        <div id="status"></div>
        <hr>
        <div id="info">
            <p>ただいまの待機組数: <span id="total">--</span> 組</p>
            <p>呼び出し中の番号: <span id="callingList" class="calling-list">--</span></p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzT3ghoyUyfSutNBu-sx0PFdgDQxQiT0tsBH_rXVEPNJkSmhC0_lky60RR6-53b1Uyd/exec';

        function saveAndCheck() {
            const num = document.getElementById('myNumber').value;
            localStorage.setItem('myNumber', num);
            checkStatus();
        }

        async function checkStatus() {
            const myNumber = localStorage.getItem('myNumber');
            if (!myNumber) return;

            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                // 0番を除外したリストを作成
                const validCallingNumbers = data.callingNumbers.filter(n => n > 0);
                
                // 待機組数の表示
                document.getElementById('total').innerText = data.totalWaiting;
                
                // 呼び出し番号の表示（カンマ区切り、空なら「なし」）
                document.getElementById('callingList').innerText = 
                    validCallingNumbers.length > 0 ? validCallingNumbers.join(', ') : "なし";

                // 自分用ステータス
                const isCalled = validCallingNumbers.includes(parseInt(myNumber));
                const statusDiv = document.getElementById('status');
                
                if (isCalled) {
                    statusDiv.innerHTML = `<h2 style="color:red;">${myNumber}番様、お呼び出し中です！</h2>`;
                } else if (parseInt(myNumber) > 0) {
                    statusDiv.innerHTML = `<h3>${myNumber}番様は待機中です。</h3>`;
                }
            } catch (e) {
                console.error("エラーが発生しました:", e);
            }
        }

        // 10秒ごとに自動更新
        setInterval(checkStatus, 10000);
        
        // ページ読み込み時に保存された番号があれば自動チェック
        if (localStorage.getItem('myNumber')) {
            document.getElementById('myNumber').value = localStorage.getItem('myNumber');
            checkStatus();
        }
    </script>
</body>
</html>
